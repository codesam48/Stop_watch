<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
    <title>Timer app</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    
    <div class="fam">
        <div class="arc"></div>
        <p class="timer">
            <span class="hour">00:</span><span class="munits">00</span>:<span class="secnds">00</span>
        </p>

    </div>
    <div class="buttons">
        <button class="start"><i class="fa-solid fa-play"></i></button>
        <button class="pause"><i class="fa-solid fa-pause"></i></button>
        <button class="reset"><i class="fa-solid fa-arrow-rotate-left"></i></button>
    </div>



    <script src="index.js"></script>
</body>
</html>
